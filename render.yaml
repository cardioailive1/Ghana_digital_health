# ============================================================
# render.yaml — Cardio AI Ghana on Render.com
# Web service + PostgreSQL managed database
# ============================================================

databases:
  - name: cardio-ai-postgres
    plan: starter        # upgrade to standard for production
    databaseName: cardioai_ghana
    user: cardioai

services:
  - type: web
    name: cardio-ai-ghana
    runtime: node
    plan: starter
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: cardio-ai-postgres
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_CLIENT_ID
        sync: false
      - key: MICROSOFT_CLIENT_SECRET
        sync: false
      - key: MICROSOFT_TENANT_ID
        value: common
      - key: CLIENT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
